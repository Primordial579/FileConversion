[package]
name = "file_converter"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
actix-multipart = "0.6"
futures-util = "0.3"
tokio = { version = "1", features = ["full"] }
image = "0.24"
printpdf = "0.5"
uuid = { version = "1", features = ["v4"] }
env_logger = "0.10"
log = "0.4"
mime_guess = "2.0"

# Optional: for font loading if you add text in PDF later
font-loader = "0.11"
